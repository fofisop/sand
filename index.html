
<html>
<head>
    <title>Pastel Sand Drop</title>
    <style>
    body { background: #f0f0f0; display: flex; flex-direction: column; align-items: center; }
 canvas { border: 2px solid #ddd; background: white; cursor: crosshair; }
#hotbar { display: flex; gap: 10px; margin-top: 15px; }
.color-btn { width: 50px; height: 50px; border: 2px solid white; border-radius: 8px; cursor: pointer;}
.color-btn.active { border-color: #555; }
body{
    background-image: url(pas.jpeg);
     font-family: 'Comfortaa';
}
</style>

</head>
<body>
    <canvas id="sandCanvas"></canvas>
    <div id="hotbar">
    
        <button class="color-btn" data-color="#FFB7B2" style="background:#FFB7B2"></button>
        <button class="color-btn" data-color="#FFDAC1" style="background:#FFDAC1"></button>
        <button class="color-btn" data-color="#FFF8BF" style="background:#FFF8BF"></button>
        <button class="color-btn" data-color="#B5EAD7" style="background:#B5EAD7"></button>
        <button class="color-btn" data-color="#C7CEEA" style="background:#C7CEEA"></button>
        <button id="eraser" class="color-btn" style="background:#fff; border: 2px dashed #ccc;">Eraser </button>
    </div>



    
    <script>
        const canvas = document.getElementById('sandCanvas');
const ctx = canvas.getContext('2d');
const width = 400, height = 400, w = 5;
canvas.width = width; canvas.height = height;

let cols = width / w;
let rows = height / w;
let grid = Array.from({ length: cols }, () => Array(rows).fill(0));
let selectedColor = '#FFB7B2';








function update() {
    let nextGrid = Array.from({ length: cols }, () => Array(rows).fill(0));

    for (let i = 0; i < cols; i++) {
        for (let j = 0; j < rows; j++) {
            let state = grid[i][j];
                 if (state !== 0) {
         if (j < rows - 1) {
                    let below = grid[i][j + 1];
                    let dir = Math.random() < 0.5 ? -1 : 1;
                 let belowA = (i + dir >= 0 && i + dir < cols) ? grid[i + dir][j + 1] : -1;
                    let belowB = (i - dir >= 0 && i - dir < cols) ? grid[i - dir][j + 1] : -1;

              if (below === 0) nextGrid[i][j + 1] = state;
                     else if (belowA === 0) nextGrid[i + dir][j + 1] = state; 
                      else if (belowB === 0) nextGrid[i - dir][j + 1] = state;
                       else nextGrid[i][j] = state;
                        } else {
                    nextGrid[i][j] = state;
                      }
            }
        }
    }
   grid = nextGrid;
}


    function render (){
         ctx.clearRect(0, 0, width, height);
    for (let i = 0; i < cols; i++) {
        for (let j = 0; j < rows; j++) {
            if (grid[i][j] !== 0) {
                ctx.fillStyle = grid[i][j];
                ctx.fillRect(i * w, j * w, w, w);
            }
        }
    }
    update();
    requestAnimationFrame(render);
}
canvas.addEventListener('mousemove', (e) => {
        if (e.buttons === 1) {
            let x = Math.floor(e.offsetX / w);
        let y = Math.floor(e.offsetY / w);
             if (x >= 0 && x < cols && y >= 0 && y < rows) grid[x][y] = selectedColor;
    }
});





document.getElementById('eraser').onclick = () => {
    selectedColor = 0; 
};
canvas.addEventListener('mousemove', (e) => {
    if (e.buttons === 1) {
         let x = Math.floor(e.offsetX / w);
        let y = Math.floor(e.offsetY / w);
          if (x >= 0 && x < cols && y >= 0 && y < rows) {
            grid[x][y] = selectedColor;
        }
    }
});

document.querySelectorAll('.color-btn, #eraser').forEach(btn => {
    btn.addEventListener('click', function() {
        document.querySelectorAll('.color-btn, #eraser').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
               selectedColor = this.id === 'eraser' ? 0 : this.getAttribute('data-color');
    });
});








document.querySelectorAll('.color-btn').forEach(btn => {
    btn.onclick = () => selectedColor = btn.getAttribute('data-color');
});

render();
    
    </script>
</body>
</html>
